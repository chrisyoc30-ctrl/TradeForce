<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeScore - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 193, 7, 0.05) 25%, rgba(255, 193, 7, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 193, 7, 0.05) 75%, rgba(255, 193, 7, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 193, 7, 0.05) 25%, rgba(255, 193, 7, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 193, 7, 0.05) 75%, rgba(255, 193, 7, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 2px;
            color: #ffc107;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: #ffc107;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .dashboard-card h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: #ffc107;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 193, 7, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 193, 7, 0.1);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 193, 7, 0.05);
        }

        .score-badge {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-btn {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            background: #ffc107;
            color: #000;
        }

        .no-leads {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #ffc107;
        }

        .spinner {
            border: 2px solid rgba(255, 193, 7, 0.2);
            border-top: 2px solid #ffc107;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-links {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
        }

        .nav-links a {
            color: #ffc107;
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover {
            color: #ffb300;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TradeScore</h1>
            <p class="subtitle">Lead Management Dashboard</p>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalLeads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="scoredLeads">0</div>
                <div class="stat-label">Scored Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgScore">0</div>
                <div class="stat-label">Average Score</div>
            </div>
        </div>

        <div class="dashboard-card">
            <h2>Your Leads</h2>
            <div id="leadsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading leads...</p>
                </div>
            </div>
        </div>

        <div class="dashboard-card">
            <button class="action-btn" onclick="scoreAllLeads()">Score All Leads with AI</button>
            <button class="action-btn" onclick="exportCSV()" style="margin-left: 10px;">Export to CSV</button>
        </div>

        <div class="nav-links">
            <a href="index.html">Submit New Lead</a>
            <a href="payment.html">View Pricing</a>
        </div>
    </div>

    <script>
        async function loadLeads() {
            try {
                const response = await fetch('https://tradeforce.onrender.com/api/get-leads');
                const leads = await response.json();

                let totalLeads = leads.length;
                let scoredLeads = leads.filter(l => l.score).length;
                let avgScore = scoredLeads > 0 ? Math.round(leads.reduce((sum, l) => sum + (l.score || 0), 0) / scoredLeads) : 0;

                document.getElementById('totalLeads').textContent = totalLeads;
                document.getElementById('scoredLeads').textContent = scoredLeads;
                document.getElementById('avgScore').textContent = avgScore;

                if (leads.length === 0) {
                    document.getElementById('leadsContainer').innerHTML = '<div class="no-leads">No leads submitted yet.</div>';
                    return;
                }

                let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Trade</th><th>Score</th><th>Status</th></tr></thead><tbody>';
                leads.forEach(lead => {
                    const score = lead.score ? `<span class="score-badge">${lead.score}/100</span>` : '<span class="score-badge">Pending</span>';
                    html += `<tr>
                        <td>${lead.name}</td>
                        <td>${lead.email}</td>
                        <td>${lead.service}</td>
                        <td>${score}</td>
                        <td>${lead.score ? 'Scored' : 'Pending'}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('leadsContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('leadsContainer').innerHTML = '<div class="no-leads">Error loading leads. Please try again.</div>';
                console.error('Error:', error);
            }
        }

        async function scoreAllLeads() {
            try {
                const response = await fetch('https://tradeforce.onrender.com/api/score-all-leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    alert('All leads have been scored!');
                    loadLeads();
                } else {
                    alert('Error scoring leads.');
                }
            } catch (error) {
                alert('Error scoring leads. Please try again.');
                console.error('Error:', error);
            }
        }

        function exportCSV() {
            fetch('https://tradeforce.onrender.com/api/get-leads')
                .then(r => r.json())
                .then(leads => {
                    let csv = 'Name,Email,Phone,Trade,Description,Location,Score\n';
                    leads.forEach(lead => {
                        csv += `"${lead.name}","${lead.email}","${lead.phone}","${lead.service}","${lead.description}","${lead.location}","${lead.score || 'Pending'}"\n`;
                    });

                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'tradescore-leads.csv';
                    a.click();
                })
                .catch(error => {
                    alert('Error exporting CSV.');
                    console.error('Error:', error);
                });
        }

        loadLeads();
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
