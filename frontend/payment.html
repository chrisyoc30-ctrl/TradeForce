<!DOCTYPE html>
<html>
<head>
    <title>TradeForce - Payment</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; }
        .form-group { margin: 20px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { margin-top: 20px; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>TradeForce Payment</h1>
    
    <form id="payment-form">
        <div class="form-group">
            <label>Plan</label>
            <select id="plan" required>
                <option value="">Select a plan</option>
                <option value="starter">Starter - £99/month</option>
                <option value="pro">Pro - £199/month</option>
                <option value="premium">Premium - £399/month</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div id="card-element"></div>

        <button type="submit">Pay Now</button>
    </form>

    <div id="message" class="message"></div>

    <script>
        const stripe = Stripe('pk_test_51TICVVGTJ3BLSGfxhQ6fgIFcpBU2UYLNMArQqOzw8b9jJrtVAwe2EDcl3ROHUvD0gjeGPKvPoyOfv1cdtrPJWP0u00vUPIRIkB');
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const plan = document.getElementById('plan').value;
            const email = document.getElementById('email').value;
            
            // Get client secret from backend
            const response = await fetch('http://localhost:5000/create-payment-intent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: getPriceInPence(plan), email: email })
            });
            
            const data = await response.json();
            const clientSecret = data.clientSecret;
            
            // Confirm payment
            const result = await stripe.confirmCardPayment(clientSecret, {
                payment_method: {
                    card: cardElement,
                    billing_details: { email: email }
                }
            });
            
            if (result.error) {
                document.getElementById('message').innerHTML = '<p class="error">Payment failed: ' + result.error.message + '</p>';
            } else {
                document.getElementById('message').innerHTML = '<p class="success">Payment successful! Thank you.</p>';
            }
        });
        
        function getPriceInPence(plan) {
            const prices = { starter: 9900, pro: 19900, premium: 39900 };
            return prices[plan];
        }
    </script>
</body>
</html>
