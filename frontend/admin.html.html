<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeScore - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 193, 7, 0.05) 25%, rgba(255, 193, 7, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 193, 7, 0.05) 75%, rgba(255, 193, 7, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 193, 7, 0.05) 25%, rgba(255, 193, 7, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 193, 7, 0.05) 75%, rgba(255, 193, 7, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 2px;
            color: #ffc107;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ffc107;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            padding: 8px 16px;
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 4px;
        }

        .nav-links a:hover {
            color: #ffb300;
            border-color: #ffc107;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 8px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: #ffc107;
            letter-spacing: 1px;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            color: #ffc107;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 193, 7, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 193, 7, 0.1);
            font-size: 13px;
        }

        tr:hover {
            background: rgba(255, 193, 7, 0.05);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .score-badge.low {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .score-badge.medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #ffc107;
        }

        .spinner {
            border: 2px solid rgba(255, 193, 7, 0.2);
            border-top: 2px solid #ffc107;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                flex-direction: column;
                width: 100%;
            }

            .nav-links a {
                width: 100%;
                text-align: center;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TradeScore Dashboard</h1>
            <div class="nav-links">
                <a href="/">Submit Lead</a>
                <a href="/payment.html">View Pricing</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Leads</div>
                <div class="stat-value" id="totalLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Scored Leads</div>
                <div class="stat-value" id="scoredLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Score</div>
                <div class="stat-value" id="avgScore">0</div>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="card-title">Your Leads</div>
            <div class="action-buttons">
                <button onclick="loadLeads()">Refresh Leads</button>
                <button onclick="scoreAllLeads()" id="scoreBtn">Score All Leads</button>
                <button onclick="exportCSV()">Export CSV</button>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading leads...</p>
            </div>

            <div id="leadsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p>No leads submitted yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadLeads() {
            const loading = document.getElementById('loading');
            const leadsContainer = document.getElementById('leadsContainer');
            const errorMessage = document.getElementById('errorMessage');

            loading.style.display = 'block';
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/get-leads');
                const data = await response.json();

                if (data.leads && data.leads.length > 0) {
                    let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Trade</th><th>Location</th><th>Score</th></tr></thead><tbody>';
                    
                    let totalScore = 0;
                    let scoredCount = 0;

                    data.leads.forEach(lead => {
                        const score = lead.score || 'Pending';
                        const scoreClass = !score || score === 'Pending' ? '' : (score < 50 ? 'low' : score < 75 ? 'medium' : '');
                        const scoreBadge = score === 'Pending' ? '<span class="score-badge">Pending</span>' : `<span class="score-badge ${scoreClass}">${score}/100</span>`;
                        
                        if (score !== 'Pending') {
                            totalScore += parseInt(score);
                            scoredCount++;
                        }

                        html += `<tr>
                            <td>${lead.name}</td>
                            <td>${lead.email}</td>
                            <td>${lead.phone}</td>
                            <td>${lead.service}</td>
                            <td>${lead.location}</td>
                            <td>${scoreBadge}</td>
                        </tr>`;
                    });

                    html += '</tbody></table>';
                    leadsContainer.innerHTML = html;

                    // Update stats
                    document.getElementById('totalLeads').textContent = data.leads.length;
                    document.getElementById('scoredLeads').textContent = scoredCount;
                    document.getElementById('avgScore').textContent = scoredCount > 0 ? Math.round(totalScore / scoredCount) : 0;
                } else {
                    leadsContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>No leads submitted yet</p></div>';
                    document.getElementById('totalLeads').textContent = '0';
                    document.getElementById('scoredLeads').textContent = '0';
                    document.getElementById('avgScore').textContent = '0';
                }
            } catch (error) {
                errorMessage.textContent = 'Error loading leads. Please try again.';
                errorMessage.style.display = 'block';
                console.error('Error:', error);
            } finally {
                loading.style.display = 'none';
            }
        }

        async function scoreAllLeads() {
            const scoreBtn = document.getElementById('scoreBtn');
            const errorMessage = document.getElementById('errorMessage');

            scoreBtn.disabled = true;
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/score-all-leads', {
                    method: 'POST'
                });

                if (response.ok) {
                    // Reload leads after scoring
                    setTimeout(() => {
                        loadLeads();
                        scoreBtn.disabled = false;
                    }, 1000);
                } else {
                    errorMessage.textContent = 'Error scoring leads. Please try again.';
                    errorMessage.style.display = 'block';
                    scoreBtn.disabled = false;
                }
            } catch (error) {
                errorMessage.textContent = 'Error scoring leads. Please try again.';
                errorMessage.style.display = 'block';
                scoreBtn.disabled = false;
                console.error('Error:', error);
            }
        }

        function exportCSV() {
            const table = document.querySelector('table');
            if (!table) {
                alert('No leads to export');
                return;
            }

            let csv = [];
            const rows = table.querySelectorAll('tr');

            rows.forEach(row => {
                const cols = row.querySelectorAll('td, th');
                const csvRow = [];
                cols.forEach(col => {
                    csvRow.push('"' + col.textContent.replace(/"/g, '""') + '"');
                });
                csv.push(csvRow.join(','));
            });

            const csvContent = 'data:text/csv;charset=utf-8,' + csv.join('\n');
            const link = document.createElement('a');
            link.setAttribute('href', encodeURI(csvContent));
            link.setAttribute('download', 'tradescore-leads.csv');
            link.click();
        }

        // Load leads on page load
        window.addEventListener('load', loadLeads);
    </script>
</body>
</html>
