<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeScore — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --steel: #1a1f2e;
    --steel-light: #1f2538;
    --amber: #f5a623;
    --amber-light: #ffc04d;
    --off-white: #f0ece3;
    --muted: #aab0c0;
    --border: rgba(245,166,35,0.2);
    --success: #4ade80;
    --error: #f87171;
    --warn: #fbbf24;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    color: var(--off-white);
  }

  .nav-logo span { color: var(--amber); }

  .nav-links {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .nav-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 0.5rem 1.1rem;
    border: 1px solid var(--border);
    color: var(--muted);
    background: none;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .nav-btn:hover { border-color: var(--amber); color: var(--amber); }

  .nav-btn.primary {
    background: var(--amber);
    color: var(--black);
    border-color: var(--amber);
  }

  .nav-btn.primary:hover { background: var(--amber-light); }

  /* ── MAIN ── */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
    position: relative;
    z-index: 1;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 2.5rem;
  }

  .page-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.4rem;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .page-sub {
    font-size: 0.85rem;
    color: var(--muted);
  }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--steel);
    border: 1px solid var(--border);
    padding: 1.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--amber);
    opacity: 0.5;
  }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--amber);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.3rem;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: var(--amber); color: var(--amber); }
  .btn:active { transform: scale(0.97); }

  .btn.amber { background: var(--amber); color: var(--black); border-color: var(--amber); }
  .btn.amber:hover { background: var(--amber-light); }

  .btn.green { border-color: rgba(74,222,128,0.4); color: var(--success); }
  .btn.green:hover { border-color: var(--success); background: rgba(74,222,128,0.08); }

  /* ── ALERT ── */
  .alert {
    display: none;
    padding: 0.75rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    border-left: 3px solid var(--error);
    background: rgba(248,113,113,0.08);
    color: var(--error);
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--steel);
    border: 1px solid var(--border);
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }

  thead {
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 0.9rem 1rem;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(0,0,0,0.2);
    white-space: nowrap;
  }

  td {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid rgba(245,166,35,0.07);
    font-size: 0.88rem;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(245,166,35,0.03); }

  .lead-name { font-weight: 600; color: var(--off-white); }

  .trade-badge {
    display: inline-block;
    background: rgba(245,166,35,0.15);
    color: var(--amber);
    border: 1px solid rgba(245,166,35,0.3);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
  }

  .score-badge {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    color: var(--amber);
    min-width: 2.5rem;
  }

  .score-badge.high { color: var(--success); }
  .score-badge.mid  { color: var(--warn); }
  .score-badge.low  { color: var(--error); }

  .score-pending {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .status {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border: 1px solid;
  }

  .status.new        { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.08); }
  .status.scored     { color: var(--success); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }
  .status.processing { color: var(--warn); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
  .status.completed  { color: var(--success); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }

  .table-msg {
    text-align: center;
    padding: 3.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .desc-cell {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: rgba(240,236,227,0.55);
    font-size: 0.82rem;
  }

  @media (max-width: 768px) {
    nav { padding: 0 1.2rem; }
    main { padding: 1.5rem 1rem; }
    .stats-row { grid-template-columns: 1fr; }
    .page-title { font-size: 2rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Trade<span>Score</span></div>
  <div class="nav-links">
    <a href="index.html" class="nav-btn">Submit Lead</a>
    <a href="payment.html" class="nav-btn primary">Upgrade Plan</a>
  </div>
</nav>

<main>
  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-tag">// Admin</div>
    <h1 class="page-title">Lead Dashboard</h1>
    <p class="page-sub">Manage and track all submitted leads</p>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="totalLeads">—</div>
      <div class="stat-label">Total Leads</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="newLeads">—</div>
      <div class="stat-label">New Leads</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="scoredLeads">—</div>
      <div class="stat-label">Scored Leads</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn" onclick="loadLeads()">⟳ &nbsp;Refresh</button>
    <button class="btn amber" onclick="scoreAllLeads()">⬡ &nbsp;Score All Leads</button>
    <button class="btn green" onclick="exportLeads()">↓ &nbsp;Export CSV</button>
  </div>

  <!-- ERROR -->
  <div id="errorMessage" class="alert"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div id="tableMsg" class="table-msg">Loading leads…</div>
    <table id="leadsTable" style="display:none;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Trade</th>
          <th>Location</th>
          <th>Description</th>
          <th>Score</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="leadsBody"></tbody>
    </table>
  </div>
</main>

<script>
  async function loadLeads() {
    try {
      const response = await fetch('https://tradeforce.onrender.com/api/get-leads');
      const data = await response.json();
      
      const leads = data.leads || [];
      const tbody = document.getElementById('leadsBody');
      const tableMsg = document.getElementById('tableMsg');
      const leadsTable = document.getElementById('leadsTable');
      
      if (leads.length === 0) {
        tableMsg.textContent = 'No leads submitted yet';
        leadsTable.style.display = 'none';
        updateStats(0, 0, 0);
        return;
      }
      
      tbody.innerHTML = '';
      let newCount = 0, scoredCount = 0;
      
      leads.forEach(lead => {
        const row = document.createElement('tr');
        const score = lead.score || null;
        const isScored = score !== null;
        const status = isScored ? 'scored' : 'new';
        
        if (status === 'new') newCount++;
        if (isScored) scoredCount++;
        
        row.innerHTML = `
          <td class="lead-name">${lead.name || '—'}</td>
          <td>${lead.phone || '—'}</td>
          <td>${lead.email || '—'}</td>
          <td><span class="trade-badge">${lead.service || '—'}</span></td>
          <td>${lead.location || '—'}</td>
          <td class="desc-cell">${lead.description || '—'}</td>
          <td>${isScored ? `<span class="score-badge ${score >= 70 ? 'high' : score >= 50 ? 'mid' : 'low'}">${score}</span>` : '<span class="score-pending">pending</span>'}</td>
          <td><span class="status ${status}">${status}</span></td>
        `;
        tbody.appendChild(row);
      });
      
      leadsTable.style.display = 'table';
      tableMsg.style.display = 'none';
      updateStats(leads.length, newCount, scoredCount);
    } catch (error) {
      console.error('Error loading leads:', error);
      document.getElementById('errorMessage').textContent = '✕ Failed to load leads';
      document.getElementById('errorMessage').style.display = 'block';
    }
  }
  
  async function scoreAllLeads() {
    try {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '⟳ Scoring…';
      
      const response = await fetch('https://tradeforce.onrender.com/api/score-all-leads', {
        method: 'POST'
      });
      
      if (response.ok) {
        await loadLeads();
        btn.textContent = '⬡ Score All Leads';
      } else {
        alert('Failed to score leads');
        btn.textContent = '⬡ Score All Leads';
      }
      btn.disabled = false;
    } catch (error) {
      console.error('Error scoring leads:', error);
      alert('Error scoring leads');
      event.target.disabled = false;
      event.target.textContent = '⬡ Score All Leads';
    }
  }
  
  function exportLeads() {
    const table = document.getElementById('leadsTable');
    if (table.style.display === 'none') {
      alert('No leads to export');
      return;
    }
    
    let csv = 'Name,Phone,Email,Trade,Location,Description,Score,Status\n';
    const rows = table.querySelectorAll('tbody tr');
    
    rows.forEach(row => {
      const cells = row.querySelectorAll('td');
      const rowData = Array.from(cells).map(cell => {
        let text = cell.textContent.trim();
        text = text.replace(/"/g, '""');
        return `"${text}"`;
      });
      csv += rowData.join(',') + '\n';
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tradescore-leads-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    window.URL.revokeObjectURL(url);
  }
  
  function updateStats(total, newLeads, scored) {
    document.getElementById('totalLeads').textContent = total;
    document.getElementById('newLeads').textContent = newLeads;
    document.getElementById('scoredLeads').textContent = scored;
  }
  
  // Load leads on page load
  loadLeads();
</script>
</body>
</html>
