<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TradeScore Glasgow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }

        .navbar {
            background: rgba(30, 30, 46, 0.8);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            padding: 20px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #fbbf24;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #fbbf24;
        }

        .logout-btn {
            background: #fbbf24;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #f59e0b;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(30, 30, 46, 0.6);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .stat-value {
            color: #fbbf24;
            font-size: 28px;
            font-weight: bold;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .lead-card {
            background: rgba(30, 30, 46, 0.6);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
        }

        .lead-card:hover {
            border-color: #fbbf24;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.1);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .lead-trade {
            color: #fbbf24;
            font-weight: 600;
            font-size: 14px;
        }

        .lead-score {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .lead-score.high {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
        }

        .lead-description {
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lead-location {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .lead-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(251, 191, 36, 0.1);
        }

        .lead-date {
            color: #6b7280;
            font-size: 12px;
        }

        .claim-btn {
            background: #fbbf24;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .claim-btn:hover {
            background: #f59e0b;
            transform: scale(1.05);
        }

        .claimed-badge {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #d1d5db;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #fbbf24;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .leads-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">TRADESCORE</div>
            <div class="nav-links">
                <a href="customer-dashboard.html">Dashboard</a>
                <a href="my-leads.html">My Leads</a>
                <a href="subscription.html">Subscription</a>
                <a href="settings.html">Settings</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Welcome, <span id="customerName">Loading...</span></h1>
            <p>Your AI-filtered leads are ready to quote</p>
        </div>

        <div class="error" id="errorMessage" style="display: none;"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Available Leads</div>
                <div class="stat-value" id="availableCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Claimed This Month</div>
                <div class="stat-value" id="claimedCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Your Plan</div>
                <div class="stat-value" id="planName">Free Trial</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Lead Score</div>
                <div class="stat-value" id="avgScore">-</div>
            </div>
        </div>

        <div class="section-title">
            <h2>Available Leads</h2>
            <a href="subscription.html" style="color: #fbbf24; text-decoration: none; font-size: 14px;">View Plans →</a>
        </div>

        <div id="leadsContainer" class="leads-grid">
            <div class="loading">Loading your leads...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://tradeforce.onrender.com/api';

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            return token;
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('customer');
            window.location.href = 'index.html';
        }

        // Load dashboard data
        async function loadDashboard() {
            const token = checkAuth();
            if (!token) return;

            try {
                const customer = JSON.parse(localStorage.getItem('customer'));
                document.getElementById('customerName').textContent = customer.name;

                // Fetch customer dashboard data
                const response = await fetch(`${API_URL}/customer/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error('Failed to load dashboard');
                }

                const data = await response.json();

                // Update stats
                document.getElementById('availableCount').textContent = data.availableLeads.length;
                document.getElementById('claimedCount').textContent = data.claimedThisMonth || 0;
                document.getElementById('planName').textContent = data.subscription.tier || 'Free Trial';
                
                // Calculate average score
                if (data.availableLeads.length > 0) {
                    const avgScore = Math.round(
                        data.availableLeads.reduce((sum, lead) => sum + (lead.score || 0), 0) / 
                        data.availableLeads.length
                    );
                    document.getElementById('avgScore').textContent = avgScore + '/100';
                }

                // Display leads
                displayLeads(data.availableLeads);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMessage').textContent = error.message;
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('leadsContainer').innerHTML = '<div class="empty-state"><h3>Error loading leads</h3><p>' + error.message + '</p></div>';
            }
        }

        // Display leads
        function displayLeads(leads) {
            const container = document.getElementById('leadsContainer');

            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No leads available yet</h3>
                        <p>Check back soon for new high-quality leads in your area</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = leads.map(lead => `
                <div class="lead-card" onclick="viewLead('${lead.id}')">
                    <div class="lead-header">
                        <div class="lead-trade">${lead.service}</div>
                        <div class="lead-score ${lead.score >= 80 ? 'high' : ''}">${lead.score}/100</div>
                    </div>
                    <div class="lead-description">${lead.description || 'Job details available after claiming'}</div>
                    <div class="lead-location">📍 ${lead.location}</div>
                    <div class="lead-footer">
                        <div class="lead-date">${new Date(lead.created_at).toLocaleDateString()}</div>
                        <button class="claim-btn" onclick="claimLead(event, '${lead.id}')">Claim Lead</button>
                    </div>
                </div>
            `).join('');
        }

        // View lead details
        function viewLead(leadId) {
            window.location.href = `lead-details.html?id=${leadId}`;
        }

        // Claim lead
        async function claimLead(event, leadId) {
            event.stopPropagation();
            const token = checkAuth();
            if (!token) return;

            try {
                const response = await fetch(`${API_URL}/customer/leads/${leadId}/claim`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to claim lead');
                }

                const data = await response.json();

                // Redirect to payment or show success
                if (data.paymentRequired) {
                    window.location.href = `payment.html?leadId=${leadId}`;
                } else {
                    alert('Lead claimed! Check your email for contact details.');
                    loadDashboard();
                }

            } catch (error) {
                alert('Error claiming lead: ' + error.message);
            }
        }

        // Load on page load
        loadDashboard();
    </script>
</body>
</html>
