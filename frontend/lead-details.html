<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Details - TradeScore Glasgow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }

        .navbar {
            background: rgba(30, 30, 46, 0.8);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #fbbf24;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .back-btn {
            color: #fbbf24;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #f59e0b;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .lead-header {
            background: rgba(30, 30, 46, 0.6);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .lead-title {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .lead-title h1 {
            font-size: 28px;
        }

        .lead-score {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .lead-score.high {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
        }

        .lead-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        .meta-label {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .meta-value {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }

        .section {
            background: rgba(30, 30, 46, 0.6);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fbbf24;
        }

        .description {
            color: #d1d5db;
            line-height: 1.8;
            font-size: 15px;
        }

        .contact-info {
            background: rgba(251, 191, 36, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .contact-info p {
            margin-bottom: 10px;
            color: #d1d5db;
        }

        .contact-label {
            color: #9ca3af;
            font-size: 13px;
        }

        .contact-value {
            color: #fbbf24;
            font-weight: 600;
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #fbbf24;
            color: #000;
        }

        .btn-primary:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(251, 191, 36, 0.2);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #fbbf24;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .lead-title {
                flex-direction: column;
                gap: 15px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">TRADESCORE</div>
            <a href="customer-dashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>
    </div>

    <div class="container">
        <div id="errorMessage" class="error" style="display: none;"></div>

        <div id="loadingState" class="loading">
            Loading lead details...
        </div>

        <div id="contentState" style="display: none;">
            <div class="lead-header">
                <div class="lead-title">
                    <div>
                        <h1 id="leadService">Loading...</h1>
                        <p style="color: #9ca3af; margin-top: 5px;" id="leadLocation">-</p>
                    </div>
                    <div class="lead-score" id="leadScoreBadge">-/100</div>
                </div>

                <div class="lead-meta">
                    <div class="meta-item">
                        <div class="meta-label">HOMEOWNER NAME</div>
                        <div class="meta-value" id="leadName">-</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">PHONE</div>
                        <div class="meta-value" id="leadPhone">-</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">EMAIL</div>
                        <div class="meta-value" style="font-size: 13px;" id="leadEmail">-</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">POSTED</div>
                        <div class="meta-value" id="leadDate">-</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Job Description</div>
                <div class="description" id="leadDescription">-</div>
            </div>

            <div class="section">
                <div class="section-title">Why This Lead Scores <span id="scoreValue">-</span>/100</div>
                <div class="description" id="leadScoreReason">-</div>
            </div>

            <div class="section">
                <div class="section-title">Next Steps</div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="claimLead()">Claim This Lead (£15)</button>
                    <button class="btn btn-secondary" onclick="goBack()">Back to Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://tradeforce.onrender.com/api';

        // Get lead ID from URL
        function getLeadId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            return token;
        }

        // Load lead details
        async function loadLead() {
            const token = checkAuth();
            if (!token) return;

            const leadId = getLeadId();
            if (!leadId) {
                showError('No lead ID provided');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/customer/leads/${leadId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load lead');
                }

                const lead = await response.json();
                displayLead(lead);

            } catch (error) {
                showError(error.message);
            }
        }

        // Display lead details
        function displayLead(lead) {
            document.getElementById('leadService').textContent = lead.service;
            document.getElementById('leadLocation').textContent = '📍 ' + lead.location;
            document.getElementById('leadName').textContent = lead.name;
            document.getElementById('leadPhone').textContent = lead.phone;
            document.getElementById('leadEmail').textContent = lead.email;
            document.getElementById('leadDescription').textContent = lead.description;
            document.getElementById('leadDate').textContent = new Date(lead.created_at).toLocaleDateString();
            
            // Score badge
            const scoreBadge = document.getElementById('leadScoreBadge');
            scoreBadge.textContent = lead.score + '/100';
            if (lead.score >= 80) {
                scoreBadge.classList.add('high');
            }

            // Score value
            document.getElementById('scoreValue').textContent = lead.score;

            // Score reason
            const scoreReasons = {
                'high': 'This lead shows strong buying signals: genuine contact details, specific job description, and clear urgency.',
                'medium': 'This lead has decent potential but may need follow-up to confirm budget and timeline.',
                'low': 'This lead needs caution - limited details or unclear commitment level.'
            };

            let scoreCategory = 'low';
            if (lead.score >= 80) scoreCategory = 'high';
            else if (lead.score >= 60) scoreCategory = 'medium';

            document.getElementById('leadScoreReason').textContent = scoreReasons[scoreCategory];

            // Show content
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('contentState').style.display = 'block';
        }

        // Claim lead
        async function claimLead() {
            const token = checkAuth();
            if (!token) return;

            const leadId = getLeadId();
            if (!leadId) return;

            try {
                const response = await fetch(`${API_URL}/customer/leads/${leadId}/claim`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to claim lead');
                }

                const data = await response.json();

                // Redirect to payment if needed
                if (data.paymentRequired) {
                    window.location.href = `payment.html?leadId=${leadId}`;
                } else {
                    alert('✅ Lead claimed! Check your email for contact details.');
                    window.location.href = 'customer-dashboard.html';
                }

            } catch (error) {
                alert('Error claiming lead: ' + error.message);
            }
        }

        // Go back
        function goBack() {
            window.location.href = 'customer-dashboard.html';
        }

        // Show error
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('loadingState').style.display = 'none';
        }

        // Load on page load
        loadLead();
    </script>
</body>
</html>
