<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeForce - Lead Submission</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message {
            display: none;
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        .nav-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-links a {
            margin: 0 15px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TradeForce</h1>
        <p class="subtitle">Submit a lead and get paid instantly</p>

        <div class="success-message" id="successMessage">
            ✅ Lead submitted successfully! Redirecting to dashboard...
        </div>

        <div class="error-message" id="errorMessage">
            ❌ Error submitting lead. Please try again.
        </div>

        <form id="leadForm">
            <div class="form-group">
                <label for="name">Lead Name *</label>
                <input type="text" id="name" name="name" required placeholder="e.g., John Smith">
            </div>

            <div class="form-group">
                <label for="phone">Lead Phone *</label>
                <input type="tel" id="phone" name="phone" required placeholder="e.g., 07700 900000">
            </div>

            <div class="form-group">
                <label for="email">Lead Email *</label>
                <input type="email" id="email" name="email" required placeholder="e.g., john@example.com">
            </div>

            <div class="form-group">
                <label for="service">Trade Type *</label>
                <select id="service" name="service" required>
                    <option value="">Select a trade...</option>
                    <option value="Plumbing">Plumber</option>
                    <option value="Electrical">Electrician</option>
                    <option value="Carpentry">Carpenter</option>
                    <option value="Roofing">Roofer</option>
                    <option value="Painting">Painter</option>
                    <option value="Gas Engineering">Gas Engineer</option>
                    <option value="Locksmith">Locksmith</option>
                    <option value="HVAC">HVAC</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Lead Description *</label>
                <textarea id="description" name="description" required placeholder="Describe the work needed..."></textarea>
            </div>

            <div class="form-group">
                <label for="location">Lead Location *</label>
                <input type="text" id="location" name="location" required placeholder="e.g., Glasgow, G1 1AA">
            </div>

            <button type="submit">Submit Lead</button>
            <div class="loading" id="loading">Submitting...</div>
        </form>

        <div class="nav-links">
            <a href="admin.html">📊 View Dashboard</a>
            <a href="payment.html">💳 Payment</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('leadForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            loading.style.display = 'block';

            // Get form data - MUST match backend field names
            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                service: document.getElementById('service').value,
                description: document.getElementById('description').value,
                location: document.getElementById('location').value,
            };

            try {
                // Send data to live backend
                const response = await fetch('https://tradeforce.onrender.com/api/submit-lead', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData),
                });

                if (response.ok) {
                    successMessage.style.display = 'block';
                    form.reset();
                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 2000);
                } else {
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = '❌ Error: ' + error.message;
                errorMessage.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
