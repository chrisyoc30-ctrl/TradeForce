<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TradeScore Glasgow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            color: #fbbf24;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .card {
            background: rgba(30, 30, 46, 0.8);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #9ca3af;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #e5e7eb;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        input::placeholder {
            color: #6b7280;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .button:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
        }

        .button:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #fbbf24;
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #f59e0b;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 13px;
        }

        .signup-link a {
            color: #fbbf24;
            text-decoration: none;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #fbbf24;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>TRADESCORE</h1>
        </div>

        <div class="card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to access your leads</p>

            <div class="error" id="errorMessage"></div>
            <div class="success" id="successMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="button" id="loginBtn">Sign In</button>
                <div class="loading" id="loading">Signing in...</div>
            </form>

            <div class="links">
                <a href="#">Forgot password?</a>
            </div>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://tradeforce.onrender.com/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loading');
            const loginBtn = document.getElementById('loginBtn');

            // Clear messages
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            // Show loading
            loadingDiv.style.display = 'block';
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Store token
                localStorage.setItem('token', data.token);
                localStorage.setItem('customer', JSON.stringify(data.customer));

                // Redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
