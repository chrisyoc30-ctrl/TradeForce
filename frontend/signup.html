<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TradeScore Glasgow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            color: #fbbf24;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .card {
            background: rgba(30, 30, 46, 0.8);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 12px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #9ca3af;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #e5e7eb;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        input::placeholder {
            color: #6b7280;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .button:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
        }

        .button:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 13px;
        }

        .login-link a {
            color: #fbbf24;
            text-decoration: none;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #fbbf24;
            font-size: 13px;
        }

        .terms {
            color: #9ca3af;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.5;
        }

        .terms a {
            color: #fbbf24;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>TRADESCORE</h1>
        </div>

        <div class="card">
            <h2>Get Started</h2>
            <p class="subtitle">Sign up to claim your 5 free leads</p>

            <div class="error" id="errorMessage"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="e.g. John McAllister" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="07700 900000" required>
                </div>

                <div class="form-group">
                    <label for="trade">Your Trade</label>
                    <select id="trade" required>
                        <option value="">Select your trade...</option>
                        <option value="Plumber">Plumber</option>
                        <option value="Electrician">Electrician (Sparky)</option>
                        <option value="Roofer">Roofer</option>
                        <option value="Joiner">Joiner / Carpenter</option>
                        <option value="Painter">Painter / Decorator</option>
                        <option value="Heating">Heating Engineer</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="postcode">Postcode</label>
                    <input type="text" id="postcode" placeholder="e.g. G12 8QQ" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="button" id="signupBtn">Create Account</button>
                <div class="loading" id="loading">Creating account...</div>

                <div class="terms">
                    By signing up, you agree to our Terms of Service and Privacy Policy. You'll receive 5 free leads to try TradeScore.
                </div>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://tradeforce.onrender.com/api';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const trade = document.getElementById('trade').value;
            const postcode = document.getElementById('postcode').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loading');
            const signupBtn = document.getElementById('signupBtn');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            // Clear messages
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            // Show loading
            loadingDiv.style.display = 'block';
            signupBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone,
                        trade,
                        postcode,
                        password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Signup failed');
                }

                // Store token
                localStorage.setItem('token', data.token);
                localStorage.setItem('customer', JSON.stringify(data.customer));

                // Redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                signupBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
