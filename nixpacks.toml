# Railway / Nixpacks: build from repo root (npm workspaces). Do not use `cd web && …`.
# See: https://nixpacks.com/docs/configuration/file
#
# Use `npm install` (not `npm ci`) so optional native deps for the *build OS* are applied
# (see https://github.com/npm/cli/issues/4828 — @tailwindcss/oxide, lightningcss).
# `--include=dev` keeps devDependencies when NODE_ENV=production.
[phases.install]
dependsOn = ["setup"]
cmds = ["npm install --include=dev --no-audit --no-fund"]

[phases.build]
dependsOn = ["install"]
# Belt-and-suspenders: glibc x64 native modules for Linux Metal builders.
cmds = [
  "npm install -w web @tailwindcss/oxide-linux-x64-gnu@4.2.4 lightningcss-linux-x64-gnu@1.32.0 --no-audit --no-fund",
  "npm run build"
]

[start]
cmd = "npm start"
