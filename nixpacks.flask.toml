# ─────────────────────────────────────────────────────────────────
# FLASK SERVICE ONLY — Railway config for the Python/Flask service.
# In Railway dashboard: Settings → Railway Config File → nixpacks.flask.toml
# This forces Python detection and installs all pip dependencies.
# ─────────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
dependsOn = ["setup"]
cmds = ["pip install -r requirements.txt"]

[phases.build]
dependsOn = ["install"]
cmds = []

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
